name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "C盘深度清理工具" --add-data "config.py;." --hidden-import "humanize" --hidden-import "psutil" --hidden-import "send2trash" main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CDrive-DeepCleaner
        path: dist/C盘深度清理工具.exe
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: CDrive-DeepCleaner
        path: ./dist
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./dist/C盘深度清理工具.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
